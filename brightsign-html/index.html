<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PixelBridge</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
  }
  #pairing {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: #fff;
  }
  #pairing .logo {
    font-size: 48px;
    color: #E85002;
    margin-bottom: 30px;
    font-weight: bold;
  }
  #pairing .code {
    font-size: 140px;
    font-weight: 900;
    letter-spacing: 20px;
  }
  #pairing .hint {
    font-size: 28px;
    color: #888;
    margin-top: 30px;
  }
  #pairing .status {
    font-size: 20px;
    color: #555;
    margin-top: 50px;
  }
</style>
</head>
<body>

<div id="pairing">
  <div class="logo">PixelBridge</div>
  <div class="code" id="code">------</div>
  <div class="hint">Inserisci questo codice nel pannello admin</div>
  <div class="status" id="status">Avvio...</div>
</div>

<script>
var SERVER_URL = "https://pixelbridge.it";
var MACHINE_NAME = "BrightSign-XT1144";
var TOKEN_PATH = "/storage/sd/pb_token.txt";

var fs = null;
try {
  fs = require('fs');
} catch (e) {
  fs = null;
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function leggiTokenSalvato() {
  if (!fs) return null;
  try {
    if (fs.existsSync(TOKEN_PATH)) {
      var t = fs.readFileSync(TOKEN_PATH, 'utf8').trim();
      if (t.length > 0) return t;
    }
  } catch (e) {
    console.log("Errore lettura token: " + e);
  }
  return null;
}

function salvaToken(token) {
  if (!fs) {
    console.log("fs non disponibile, impossibile salvare token su file");
    return;
  }
  try {
    fs.writeFileSync(TOKEN_PATH, token, 'utf8');
    console.log("Token salvato su " + TOKEN_PATH);
  } catch (e) {
    console.log("Errore scrittura token: " + e);
  }
}

function generaCodice() {
  var c = "";
  for (var i = 0; i < 6; i++) {
    c += Math.floor(Math.random() * 10);
  }
  return c;
}

function avviaPlayer(token) {
  setStatus("Avvio player...");
  window.location.href = SERVER_URL + "/player/display.php?token=" + token;
}

function avviaPairing() {
  var code = generaCodice();
  document.getElementById("code").textContent = code;
  setStatus("Registrazione in corso...");

  fetch(SERVER_URL + "/api/claim.php?action=register&code=" + code + "&machine=" + encodeURIComponent(MACHINE_NAME))
    .then(function(res) { return res.text(); })
    .then(function() {
      setStatus("In attesa di conferma dal pannello admin...");
      pollCheck(code);
    })
    .catch(function(err) {
      setStatus("Errore di rete, riprovo tra 5s...");
      setTimeout(avviaPairing, 5000);
    });
}

function pollCheck(code) {
  fetch(SERVER_URL + "/api/claim.php?action=check&code=" + code)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data && data.token) {
        setStatus("Pairing completato!");
        salvaToken(data.token);
        setTimeout(function() { avviaPlayer(data.token); }, 1000);
      } else {
        setTimeout(function() { pollCheck(code); }, 3000);
      }
    })
    .catch(function(err) {
      setTimeout(function() { pollCheck(code); }, 3000);
    });
}

var savedToken = leggiTokenSalvato();
if (savedToken) {
  setStatus("Token trovato su SD, avvio player...");
  avviaPlayer(savedToken);
} else {
  avviaPairing();
}
</script>

</body>
</html>
