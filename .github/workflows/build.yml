name: Build PixelBridge Agent

on:
  push:
    paths:
      - 'agent.py'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:  # permette di lanciarlo manualmente dal sito GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Build exe
        run: |
          pyinstaller --onefile --noconsole --name "PixelBridge" agent.py

      - name: Pubblica Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-latest
          name: "PixelBridge Agent - Latest"
          body: |
            ## PixelBridge Agent per Windows

            ### Installazione
            1. Scarica `PixelBridge.exe`
            2. Mettilo in una cartella (es. `C:\PixelBridge\`)
            3. Eseguilo — compare il codice di pairing a schermo
            4. Inserisci il codice nel pannello admin
          files: dist/PixelBridge.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
